<!doctype html>
<html lang="id" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Turnamen Futsal Juare Cup 2026</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Bebas Neue', 'sans-serif'],
            body: ['Plus Jakarta Sans', 'sans-serif']
          }
        }
      }
    }
  </script>
  <style>
    html, body { height: 100%; margin: 0; }
    * { font-family: 'Plus Jakarta Sans', sans-serif; }
    .nav-btn { transition: background 0.2s, transform 0.2s; }
    .nav-btn:hover { transform: translateY(-2px); }
    .section-fade { animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .hero-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0d47a1 100%); }
    .card-hover { transition: transform 0.2s, box-shadow 0.2s; }
    .card-hover:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(13,71,161,0.2); }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full bg-slate-50 overflow-auto">
  <div id="app" class="w-full min-h-full"><!-- Navigation -->
   <nav class="sticky top-0 z-50 bg-slate-900/95 backdrop-blur border-b border-blue-800/30">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
     <div class="flex items-center gap-2"><span class="text-2xl">⚽</span> <span class="font-display text-xl text-white tracking-wide">JUARE CUP</span>
     </div>
     <div class="hidden md:flex gap-1" id="nav-desktop"></div><button id="mobile-menu-btn" class="md:hidden text-white p-2" onclick="toggleMobileMenu()"> <i data-lucide="menu" class="w-6 h-6"></i> </button>
    </div>
    <div id="mobile-menu" class="hidden md:hidden px-4 pb-4"></div>
   </nav><!-- Content Sections -->
   <main id="main-content"></main><!-- Footer -->
   <footer class="bg-slate-900 text-slate-400 text-center py-6 px-4 text-sm">
    <p>Dikembangkan oleh <span class="text-blue-400 font-semibold">Grup Juare Informatika</span> © 2026</p>
    <p class="mt-1 text-xs">Turnamen Futsal "Juare Cup" Tingkat SMK Se-Kota Cilegon</p>
   </footer>
  </div>
  <script>
    const defaultConfig = {
      main_title: 'TURNAMEN FUTSAL "JUARE CUP"',
      tagline: 'Sportif, Solid, Juara!',
      bg_color: '#0f172a',
      text_color: '#ffffff',
      accent_color: '#1d4ed8',
      surface_color: '#f8fafc',
      secondary_action_color: '#64748b'
    };

    const navItems = [
      { id: 'beranda', label: 'Beranda', icon: 'home' },
      { id: 'tujuan', label: 'Tujuan', icon: 'target' },
      { id: 'panitia', label: 'Panitia', icon: 'users' },
      { id: 'fitur', label: 'Fitur', icon: 'clipboard-list' },
      { id: 'peraturan', label: 'Peraturan', icon: 'book-open' },
      { id: 'pendaftaran', label: 'Pendaftaran', icon: 'user-plus' }
    ];

    let activeSection = 'beranda';

    function navigate(id) {
      activeSection = id;
      renderContent();
      document.getElementById('mobile-menu').classList.add('hidden');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function toggleMobileMenu() {
      document.getElementById('mobile-menu').classList.toggle('hidden');
    }

    function renderNav() {
      const desktop = document.getElementById('nav-desktop');
      const mobile = document.getElementById('mobile-menu');
      desktop.innerHTML = navItems.map(n => `
        <button onclick="navigate('${n.id}')" class="nav-btn px-3 py-1.5 rounded text-sm font-medium ${activeSection === n.id ? 'bg-blue-600 text-white' : 'text-slate-300 hover:bg-slate-700'}">
          ${n.label}
        </button>
      `).join('');
      mobile.innerHTML = navItems.map(n => `
        <button onclick="navigate('${n.id}')" class="block w-full text-left px-4 py-2 rounded text-sm font-medium ${activeSection === n.id ? 'bg-blue-600 text-white' : 'text-slate-300 hover:bg-slate-700'}">
          ${n.label}
        </button>
      `).join('');
    }

    function getConfig() {
      return window.elementSdk?.config || defaultConfig;
    }

    function renderContent() {
      renderNav();
      const config = getConfig();
      const main = document.getElementById('main-content');
      const sections = {
        beranda: renderBeranda,
        tujuan: renderTujuan,
        panitia: renderPanitia,
        fitur: renderFitur,
        peraturan: renderPeraturan,
        pendaftaran: renderPendaftaran
      };
      main.innerHTML = `<div class="section-fade">${sections[activeSection](config)}</div>`;
      lucide.createIcons();
    }

    function renderBeranda(c) {
      return `
        <div class="hero-gradient text-white py-20 px-6 text-center">
          <div class="max-w-3xl mx-auto">
            <div class="text-6xl mb-4">⚽</div>
            <h1 class="font-display text-4xl md:text-6xl tracking-wide mb-3">${c.main_title || defaultConfig.main_title}</h1>
            <p class="text-lg text-blue-200 mb-2">TINGKAT SMK SE-KOTA CILEGON</p>
            <p class="text-2xl font-display tracking-widest text-yellow-300 mt-4">"${c.tagline || defaultConfig.tagline}"</p>
            <div class="mt-8 flex flex-wrap justify-center gap-4">
              <button onclick="navigate('pendaftaran')" class="nav-btn bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded-lg font-semibold">
                <span class="flex items-center gap-2"><i data-lucide="user-plus" class="w-5 h-5"></i> Daftar Sekarang</span>
              </button>
              <button onclick="navigate('fitur')" class="nav-btn border border-white/30 hover:bg-white/10 text-white px-6 py-3 rounded-lg font-semibold">
                Info Turnamen
              </button>
            </div>
          </div>
        </div>
        <div class="max-w-5xl mx-auto px-4 py-12 grid md:grid-cols-3 gap-6">
          ${[
            { icon: 'trophy', title: 'Kompetitif', desc: 'Pertandingan seru antar SMK se-Kota Cilegon' },
            { icon: 'heart-handshake', title: 'Silaturahmi', desc: 'Mempererat persaudaraan antar pelajar' },
            { icon: 'flame', title: 'Sportivitas', desc: 'Menjunjung tinggi semangat fair play' }
          ].map(item => `
            <div class="card-hover bg-white rounded-xl p-6 text-center shadow-sm border border-slate-100">
              <div class="w-12 h-12 rounded-full bg-blue-100 flex items-center justify-center mx-auto mb-4">
                <i data-lucide="${item.icon}" class="w-6 h-6 text-blue-600"></i>
              </div>
              <h3 class="font-bold text-slate-800 mb-2">${item.title}</h3>
              <p class="text-sm text-slate-600">${item.desc}</p>
            </div>
          `).join('')}
        </div>`;
    }

    function renderTujuan(c) {
      const tujuan = [
        'Menjalin silaturahmi dan mempererat persaudaraan antar pelajar tingkat SMK se-Kota Cilegon.',
        'Menumbuhkan semangat sportivitas, disiplin, dan kerja sama tim melalui kegiatan olahraga futsal.',
        'Menjadi wadah pengembangan bakat dan minat siswa di bidang olahraga, khususnya futsal.',
        'Mendorong generasi muda untuk aktif dalam kegiatan positif, sehat, dan kompetitif.'
      ];
      return `
        <div class="max-w-4xl mx-auto px-4 py-12">
          <h2 class="font-display text-3xl text-slate-900 text-center mb-8">TUJUAN TURNAMEN</h2>
          <div class="space-y-4">
            ${tujuan.map((t, i) => `
              <div class="card-hover bg-white rounded-lg p-5 shadow-sm border-l-4 border-blue-600 flex items-start gap-4">
                <span class="flex-shrink-0 w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center font-bold text-sm">${i + 1}</span>
                <p class="text-slate-700">${t}</p>
              </div>
            `).join('')}
          </div>
        </div>`;
    }

    function renderPanitia(c) {
      return `
        <div class="max-w-5xl mx-auto px-4 py-12">
          <h2 class="font-display text-3xl text-slate-900 text-center mb-8">STRUKTUR KEPANITIAAN</h2>
          <div class="grid md:grid-cols-2 gap-6">
            <div class="bg-white rounded-xl p-6 shadow-sm border border-slate-100">
              <h3 class="font-bold text-blue-700 mb-4 flex items-center gap-2"><i data-lucide="shield" class="w-5 h-5"></i> Inti Panitia</h3>
              <ul class="space-y-3 text-sm text-slate-700">
                <li class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-blue-600"></span><strong>Pelindung:</strong> Kepala Sekolah / Instansi terkait</li>
                <li class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-blue-600"></span><strong>Penanggung Jawab:</strong> Pembina OSIS / Guru Olahraga</li>
                <li class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-blue-600"></span><strong>Steering Committee:</strong> Pengarah & pengawasan</li>
                <li class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-blue-600"></span><strong>Ketua Panitia:</strong> Memimpin seluruh kegiatan</li>
                <li class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-blue-600"></span><strong>Wakil Ketua:</strong> Membantu ketua panitia</li>
                <li class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-blue-600"></span><strong>Sekretaris:</strong> Administrasi & surat-menyurat</li>
                <li class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-blue-600"></span><strong>Bendahara:</strong> Mengelola keuangan</li>
              </ul>
            </div>
            <div class="bg-white rounded-xl p-6 shadow-sm border border-slate-100">
              <h3 class="font-bold text-blue-700 mb-4 flex items-center gap-2"><i data-lucide="briefcase" class="w-5 h-5"></i> Seksi-Seksi</h3>
              <ul class="space-y-2 text-sm text-slate-700">
                ${['Acara – Rundown & teknis', 'Pertandingan – Jadwal & wasit', 'Perlengkapan – Bola, rompi, sound system', 'Konsumsi – Panitia & official', 'Humas – Publikasi & sponsor', 'Keamanan – Ketertiban', 'Kesehatan – P3K & tim medis', 'Dokumentasi – Foto, video, medsos', 'Dana Usaha – Sponsorship', 'Registrasi – Pendataan peserta'].map(s => `
                  <li class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-yellow-500"></span>${s}</li>
                `).join('')}
              </ul>
            </div>
          </div>
        </div>`;
    }

    function renderFitur(c) {
      const fiturUtama = [
        { title: 'Sistem Pertandingan', items: ['Sistem gugur / setengah kompetisi', 'Jadwal pertandingan jelas', 'Bagan turnamen'] },
        { title: 'Wasit & Official', items: ['Wasit berpengalaman / bersertifikat', 'Meja official pertandingan'] },
        { title: 'Keamanan & Ketertiban', items: ['Pengamanan supporter', 'Larangan kericuhan'] },
        { title: 'Kesehatan & Keselamatan', items: ['Kotak P3K', 'Tim medis / ambulans siaga'] },
        { title: 'Administrasi Peserta', items: ['Formulir pendaftaran', 'Kartu pelajar / identitas', 'Technical meeting'] },
        { title: 'Sarana & Prasarana', items: ['Lapangan standar futsal', 'Bola standar', 'Ruang pemain / bench'] },
        { title: 'Penghargaan', items: ['Juara 1, 2, 3', 'Best Player', 'Top Score', 'Best Supporter (opsional)'] },
        { title: 'Dokumentasi & Publikasi', items: ['Poster turnamen', 'Foto/video', 'Media sosial'] },
        { title: 'Sponsor & Branding', items: ['Banner sponsor', 'Media partner', 'Booth sponsor'] }
      ];
      const fiturTambahan = ['Live score pertandingan', 'Live streaming final', 'MC profesional', 'Opening ceremony', 'Doorprize penonton', 'Lomba supporter terbaik', 'Sertifikat peserta dan panitia', 'Merchandise turnamen'];
      return `
        <div class="max-w-5xl mx-auto px-4 py-12">
          <h2 class="font-display text-3xl text-slate-900 text-center mb-8">FITUR TURNAMEN</h2>
          <div class="grid md:grid-cols-3 gap-4 mb-10">
            ${fiturUtama.map(f => `
              <div class="card-hover bg-white rounded-lg p-5 shadow-sm border border-slate-100">
                <h4 class="font-bold text-blue-700 text-sm mb-3">${f.title}</h4>
                <ul class="space-y-1 text-xs text-slate-600">${f.items.map(i => `<li class="flex items-start gap-1.5"><span class="mt-1.5 w-1.5 h-1.5 rounded-full bg-blue-400 flex-shrink-0"></span>${i}</li>`).join('')}</ul>
              </div>
            `).join('')}
          </div>
          <div class="bg-gradient-to-r from-blue-50 to-indigo-50 rounded-xl p-6 border border-blue-100">
            <h3 class="font-bold text-blue-800 mb-4 flex items-center gap-2"><i data-lucide="sparkles" class="w-5 h-5"></i> Fitur Tambahan (Opsional)</h3>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
              ${fiturTambahan.map(f => `<span class="text-xs bg-white rounded-full px-3 py-1.5 text-slate-700 border border-slate-200">${f}</span>`).join('')}
            </div>
          </div>
        </div>`;
    }

    function renderPeraturan(c) {
      return `
        <div class="max-w-4xl mx-auto px-4 py-12">
          <h2 class="font-display text-3xl text-slate-900 text-center mb-8">PERATURAN PERTANDINGAN</h2>
          <div class="space-y-4">
            ${[
              { title: 'Durasi Pertandingan', desc: '2 x 15 menit (babak penyisihan), 2 x 20 menit (semifinal & final). Istirahat 5 menit.' },
              { title: 'Jumlah Pemain', desc: '5 pemain inti + 7 pemain cadangan. Minimal 4 pemain untuk memulai pertandingan.' },
              { title: 'Sistem Poin', desc: 'Menang = 3 poin, Seri = 1 poin, Kalah = 0 poin. Head-to-head jika poin sama.' },
              { title: 'Kartu & Pelanggaran', desc: 'Kartu kuning: peringatan. 2 kartu kuning = kartu merah. Kartu merah = diskualifikasi 1 pertandingan.' },
              { title: 'Adu Penalti', desc: 'Jika seri di babak gugur, dilakukan adu penalti 5 tendangan. Sudden death jika masih seri.' },
              { title: 'Persyaratan Peserta', desc: 'Siswa aktif SMK se-Kota Cilegon. Membawa kartu pelajar asli. Maksimal usia 20 tahun.' },
              { title: 'Larangan', desc: 'Dilarang menggunakan pemain ilegal, tindakan anarkis, dan provokasi terhadap lawan/wasit.' }
            ].map((r, i) => `
              <div class="bg-white rounded-lg p-5 shadow-sm border border-slate-100">
                <h4 class="font-bold text-slate-800 flex items-center gap-2 mb-2">
                  <span class="w-7 h-7 rounded bg-blue-600 text-white flex items-center justify-center text-xs font-bold">${i + 1}</span>
                  ${r.title}
                </h4>
                <p class="text-sm text-slate-600 ml-9">${r.desc}</p>
              </div>
            `).join('')}
          </div>
        </div>`;
    }

    function renderPendaftaran(c) {
      return `
        <div class="max-w-2xl mx-auto px-4 py-12">
          <h2 class="font-display text-3xl text-slate-900 text-center mb-8">FORMULIR PENDAFTARAN</h2>
          <form id="regForm" onsubmit="handleRegister(event)" class="bg-white rounded-xl p-6 md:p-8 shadow-sm border border-slate-100 space-y-5">
            <div>
              <label for="teamName" class="block text-sm font-medium text-slate-700 mb-1">Nama Tim</label>
              <input type="text" id="teamName" required class="w-full border border-slate-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="Masukkan nama tim">
            </div>
            <div>
              <label for="schoolName" class="block text-sm font-medium text-slate-700 mb-1">Asal Sekolah (SMK)</label>
              <input type="text" id="schoolName" required class="w-full border border-slate-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="Nama SMK">
            </div>
            <div>
              <label for="captainName" class="block text-sm font-medium text-slate-700 mb-1">Nama Kapten</label>
              <input type="text" id="captainName" required class="w-full border border-slate-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="Nama lengkap kapten">
            </div>
            <div>
              <label for="phone" class="block text-sm font-medium text-slate-700 mb-1">No. WhatsApp Kapten</label>
              <input type="tel" id="phone" required class="w-full border border-slate-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="08xxxxxxxxxx">
            </div>
            <div>
              <label for="playerCount" class="block text-sm font-medium text-slate-700 mb-1">Jumlah Pemain</label>
              <select id="playerCount" required class="w-full border border-slate-300 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                <option value="">Pilih jumlah</option>
                <option value="10">10 pemain</option>
                <option value="11">11 pemain</option>
                <option value="12">12 pemain</option>
              </select>
            </div>
            <button type="submit" class="nav-btn w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 rounded-lg">
              Daftar Sekarang
            </button>
            <div id="regMsg" class="hidden text-center p-4 rounded-lg bg-green-50 border border-green-200 text-green-700 text-sm font-medium"></div>
          </form>
        </div>`;
    }

    function handleRegister(e) {
      e.preventDefault();
      const msg = document.getElementById('regMsg');
      const team = document.getElementById('teamName').value;
      msg.textContent = `✅ Tim "${team}" berhasil didaftarkan! Silakan hadir di Technical Meeting.`;
      msg.classList.remove('hidden');
      e.target.reset();
      setTimeout(() => msg.classList.add('hidden'), 5000);
    }

    // Element SDK init
    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => { renderContent(); },
      mapToCapabilities: (config) => ({
        recolorables: [
          { get: () => config.bg_color || defaultConfig.bg_color, set: (v) => { config.bg_color = v; window.elementSdk.setConfig({ bg_color: v }); } },
          { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
          { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
          { get: () => config.accent_color || defaultConfig.accent_color, set: (v) => { config.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); } },
          { get: () => config.secondary_action_color || defaultConfig.secondary_action_color, set: (v) => { config.secondary_action_color = v; window.elementSdk.setConfig({ secondary_action_color: v }); } }
        ],
        borderables: [],
        fontEditable: undefined,
        fontSizeable: undefined
      }),
      mapToEditPanelValues: (config) => new Map([
        ['main_title', config.main_title || defaultConfig.main_title],
        ['tagline', config.tagline || defaultConfig.tagline]
      ])
    });

    renderContent();
  </script>
